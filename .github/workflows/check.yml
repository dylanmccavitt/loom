name: check

on:
  pull_request:
  push:

permissions:
  contents: read

# Per-ref groups: push (refs/heads/*) and PR (refs/pull/*/merge) runs never share a
# group, so a PR run can never cancel the push run that feeds required branch-protection
# contexts on the same SHA (a CANCELLED required context blocks merges — see #200).
# cancel-in-progress only ever kills runs of superseded SHAs on the same ref, which
# branch protection ignores.
concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check
