name: live-smoke

# Opt-in live tracker smoke (FN-47). Runs ONLY on manual dispatch — never on
# push or pull_request — so the default `check` workflow stays the hermetic,
# always-on pipeline and this advisory live pass is triggered deliberately.
# Because this is a separate workflow, a failure here never blocks `check`.
#
# All credentials come from repo secrets (never committed here). The disposable
# sandbox targets may be overridden per-run via dispatch inputs, else fall back
# to repo secrets. See docs/factory-nucleus/live-smoke.md.
#
# Required repo secrets (operator-configured; this file only references them):
#   LIVE_SMOKE_LINEAR_KEY     - Linear personal API key for the sandbox workspace
#   LIVE_SMOKE_LINEAR_TEAM    - disposable Linear team (key/name/id); NEVER the real team
#   LIVE_SMOKE_LINEAR_PROJECT - disposable Linear project (name/id)
#   LIVE_SMOKE_GITHUB_PAT     - PAT with issue access to the sandbox repo (the
#                               default GITHUB_TOKEN cannot write to a *different* repo)
#   LIVE_SMOKE_GITHUB_REPO    - disposable GitHub sandbox repo (owner/name); NEVER production
on:
  workflow_dispatch:
    inputs:
      linear_team:
        description: "Disposable Linear sandbox team (key/name/id) — NEVER the real planning team. Blank = use secret."
        required: false
        default: ""
      linear_project:
        description: "Disposable Linear sandbox project (name/id). Blank = use secret."
        required: false
        default: ""
      github_repo:
        description: "Disposable GitHub sandbox repo (owner/name) — NEVER production. Blank = use secret."
        required: false
        default: ""

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Run live tracker smoke (opt-in)
        env:
          LOO_LIVE_SMOKE: "1"
          # Disposable sandbox targets: dispatch input first, else repo secret.
          LOO_LIVE_LINEAR_TEAM: ${{ inputs.linear_team || secrets.LIVE_SMOKE_LINEAR_TEAM }}
          LOO_LIVE_LINEAR_PROJECT: ${{ inputs.linear_project || secrets.LIVE_SMOKE_LINEAR_PROJECT }}
          LOO_LIVE_GITHUB_REPO: ${{ inputs.github_repo || secrets.LIVE_SMOKE_GITHUB_REPO }}
          # Credentials are secrets-only (never dispatch inputs, which echo in the UI).
          LINEAR_API_KEY: ${{ secrets.LIVE_SMOKE_LINEAR_KEY }}
          # A PAT with cross-repo issue access; the default GITHUB_TOKEN cannot
          # write issues to a *different* sandbox repo.
          GITHUB_TOKEN: ${{ secrets.LIVE_SMOKE_GITHUB_PAT }}
        run: node --test tests/factory-nucleus-live-smoke.test.mjs
