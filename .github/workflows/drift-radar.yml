name: drift-radar

# Advisory weekly OMP snapshot pin vs npm latest. Never blocks merges.
on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run OMP snapshot drift radar
        run: |
          set -euo pipefail
          node scripts/radar-snapshot-drift.mjs | tee drift-report.txt

      - name: Sync drift-radar issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh label create drift-radar --color "c5def5" --description "Weekly OMP snapshot npm drift radar" 2>/dev/null || true

          REPORT="$(cat drift-report.txt)"
          VERDICT_LINE="$(printf '%s\n' "$REPORT" | tail -n 1)"

          parse_kv() {
            printf '%s\n' "$VERDICT_LINE" | sed -n "s/.*$1=\\([^ ]*\\).*/\\1/p"
          }

          VERDICT="$(parse_kv verdict)"
          PINNED="$(parse_kv pinned)"
          LATEST="$(parse_kv latest)"

          OPEN_ISSUE="$(gh issue list --label drift-radar --state open --json number --jq '.[0].number // empty')"

          if [ "$VERDICT" = "DRIFT" ]; then
            TITLE="OMP snapshot drift: ${PINNED} vs ${LATEST}"
            if [ -z "$OPEN_ISSUE" ]; then
              gh issue create --label drift-radar --title "$TITLE" --body "$REPORT"
            else
              gh issue edit "$OPEN_ISSUE" --title "$TITLE" --body "$REPORT"
            fi
          elif [ "$VERDICT" = "CURRENT" ]; then
            if [ -n "$OPEN_ISSUE" ]; then
              gh issue comment "$OPEN_ISSUE" --body "Drift resolved: pinned ${PINNED} matches npm latest ${LATEST}."
              gh issue close "$OPEN_ISSUE"
            fi
          fi
