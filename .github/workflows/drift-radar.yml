name: drift-radar

# Advisory weekly radar: compose every drift surface into one markdown report,
# upload it as an artifact, and upsert one marker-identified drift-radar issue.
# Never files issue-per-finding reports and never compares live HOME in CI.
on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc

      - name: Compose weekly drift report
        id: radar
        run: |
          set +e
          node scripts/radar-report.mjs --out drift-report.md
          RADAR_EXIT="$?"
          set -e

          echo "exit_code=${RADAR_EXIT}" >> "$GITHUB_OUTPUT"
          cat drift-report.md

      - name: Upload weekly drift report
        uses: actions/upload-artifact@v4
        with:
          name: weekly-drift-radar-report
          path: drift-report.md

      - name: Upsert drift-radar issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          MARKER="<!-- loom-drift-radar:weekly-consolidated -->"
          TITLE="Weekly drift radar consolidated report"
          TODAY="$(date -u +%Y-%m-%d)"

          gh label create drift-radar --color "c5def5" --description "Weekly consolidated drift radar" 2>/dev/null || true

          ISSUE_NUMBER="$(
            gh issue list --label drift-radar --state open --json number,body \
              --jq '.[] | select(.body | contains("<!-- loom-drift-radar:weekly-consolidated -->")) | .number' \
              | head -n 1
          )"

          if [ -z "$ISSUE_NUMBER" ]; then
            gh issue create --label drift-radar --title "$TITLE" --body-file drift-report.md
          else
            gh issue edit "$ISSUE_NUMBER" --title "$TITLE" --body-file drift-report.md
            gh issue comment "$ISSUE_NUMBER" --body "Weekly drift radar refreshed on ${TODAY} UTC (composer exit ${{ steps.radar.outputs.exit_code }})."
          fi
