<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module Map</title>
<style>
:root{--ivory:#FAF9F5;--slate:#141413;--clay:#D97757;--oat:#E3DACC;--olive:#788C5D;--g150:#F0EEE6;--g300:#D1CFC5;--g500:#87867F;--g700:#3D3D3A;--white:#fff;--serif:ui-serif,Georgia,"Times New Roman",serif;--sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;--mono:ui-monospace,"SF Mono",Menlo,Monaco,Consolas,monospace}
*{box-sizing:border-box}body{margin:0;background:var(--ivory);color:var(--g700);font-family:var(--sans);line-height:1.55;padding:48px 32px;overflow-x:hidden}.page{max-width:1040px;margin:0 auto}.eyebrow,.path,th,.tag{font-family:var(--mono)}.eyebrow{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--g500)}h1,h2,h3{font-family:var(--serif);font-weight:500;color:var(--slate)}h1{font-size:36px;line-height:1.15;overflow-wrap:anywhere}.read-order,.diagram,.file-map,.flow{background:var(--white);border:1.5px solid var(--g300);border-radius:12px}.read-order{padding:18px 22px;margin:22px 0 40px}.read-order ol{padding-left:22px}.path{background:var(--g150);border:1px solid var(--g300);border-radius:6px;padding:2px 6px;font-size:12px;overflow-wrap:anywhere}.diagram{padding:24px;overflow:auto;margin-bottom:40px}.diagram svg{min-width:760px}.file-map{width:100%;border-collapse:collapse;overflow:hidden;margin-bottom:40px}.file-map th,.file-map td{padding:13px;border-bottom:1px solid var(--g150);text-align:left;vertical-align:top}.file-map th{background:var(--g150);font-size:11px;text-transform:uppercase;color:var(--g500)}.flow{padding:18px 22px}
@media(max-width:800px){body{padding:28px 18px}.page{width:min(330px,calc(100vw - 36px));margin:0}.diagram svg{min-width:0;width:100%;height:auto}h1{font-size:28px}}
</style></head>
<body><div class="page"><header><div class="eyebrow">Module map &middot; repo</div><h1>Module name</h1></header><section class="read-order"><h2>First-read order</h2><ol><li><span class="path">path/to/file</span> - why it matters.</li></ol></section><section><h2>Module diagram</h2><div class="diagram"><svg width="760" height="220" viewBox="0 0 760 220"><rect x="20" y="40" width="150" height="70" rx="12" fill="#F0EEE6" stroke="#D1CFC5"/><text x="40" y="80" fill="#141413" font-family="monospace">entry</text><rect x="300" y="40" width="150" height="70" rx="12" fill="#fff" stroke="#D97757"/><text x="320" y="80" fill="#141413" font-family="monospace">core</text><path d="M170 75 L300 75" stroke="#87867F"/></svg></div></section><section><h2>File map</h2><table class="file-map"><tr><th>File</th><th>Role</th><th>Why it matters</th></tr><tr><td><span class="path">file</span></td><td>role</td><td>note</td></tr></table></section><section class="flow"><h2>Main flow</h2><p>Numbered flow from entry to output.</p></section></div></body></html>
