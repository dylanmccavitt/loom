<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Ticket Triage</title>
<style>
:root{--ivory:#FAF9F5;--slate:#141413;--clay:#D97757;--clay-d:#B85C3E;--oat:#E3DACC;--olive:#788C5D;--g50:#F0EEE6;--g200:#D1CFC5;--g500:#87867F;--g800:#3D3D3A;--white:#fff;--serif:ui-serif,Georgia,"Times New Roman",serif;--sans:system-ui,-apple-system,"Segoe UI",sans-serif;--mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace}
*{box-sizing:border-box}body{margin:0;background:var(--ivory);color:var(--slate);font-family:var(--sans);font-size:14px;line-height:1.5;overflow-x:hidden}.wrap{max-width:1180px;margin:0 auto;padding:48px 32px}.eyebrow,.hint,.summary,.key,.tag,.estimate,button{font-family:var(--mono)}.eyebrow{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--g500)}h1,.col-title{font-family:var(--serif);font-weight:500}h1{font-size:30px;margin:6px 0}.sub{color:var(--g500);max-width:680px}.hint{font-size:11px;color:var(--g500);margin-top:10px}.hint:before{content:">";color:var(--clay);margin-right:6px}.toolbar{position:sticky;top:0;z-index:5;background:var(--ivory);display:flex;align-items:center;gap:14px;padding:14px 0 12px;margin:24px 0 14px;border-bottom:1.5px solid var(--g200)}.spacer{flex:1}button{border-radius:999px;padding:9px 16px;cursor:pointer}.primary{background:var(--slate);color:var(--ivory);border:1.5px solid var(--slate)}.ghost{background:transparent;border:1.5px solid var(--g200)}.board{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-items:start}.col{background:var(--white);border:1.5px solid var(--g200);border-top:3px solid var(--g500);border-radius:12px;overflow:hidden}.col[data-col=now]{border-top-color:var(--clay)}.col[data-col=next]{border-top-color:var(--olive)}.col-head{padding:14px;display:flex;justify-content:space-between;border-bottom:1.5px solid var(--g50)}.col-title{font-size:19px}.count{border:1px solid var(--g200);background:var(--g50);border-radius:999px;padding:2px 8px;color:var(--g500);font-family:var(--mono);font-size:11px}.cards{padding:12px 10px;display:grid;gap:8px;min-height:120px}.card{background:var(--white);border:1.5px solid var(--g200);border-radius:8px;padding:10px 12px;cursor:grab}.meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}.key{font-size:11px;color:var(--g500)}.tag{font-size:10px;text-transform:uppercase;border:1px solid var(--g200);background:var(--g50);border-radius:999px;padding:1px 6px}.title{color:var(--slate);font-size:13.5px;margin-bottom:7px}.desc{color:var(--g500);font-size:12.5px}.estimate{border-top:1.5px solid var(--g50);padding:9px 14px;color:var(--g500);display:flex;justify-content:space-between}.hide{display:none}
@media(max-width:1000px){.board{grid-template-columns:repeat(2,1fr)}}@media(max-width:640px){.wrap{width:min(330px,calc(100vw - 28px));padding:28px 14px;margin:0}.toolbar{flex-wrap:wrap}.board{grid-template-columns:1fr}h1{font-size:26px}}
</style></head>
<body><div class="wrap"><header><div class="eyebrow">Project / triage</div><h1>Cycle triage</h1><p class="sub">Drag tickets between columns, filter tags, then copy the result as Markdown.</p><div class="hint">drag tickets between columns and copy the final ordering</div></header><div class="toolbar"><div class="summary" id="summary"></div><span class="spacer"></span><button class="ghost" id="reset">Reset</button><button class="primary" id="copy">Copy as markdown</button></div><main class="board"><section class="col" data-col="now"><div class="col-head"><div class="col-title">Now</div><div class="count">1</div></div><div class="cards"><article class="card" draggable="true" data-tags="bug"><div class="meta"><span class="key">ISSUE-1</span><button class="tag">bug</button></div><div class="title">Ticket title</div><p class="desc">Why it is here.</p></article></div><div class="estimate"><span>estimate</span><b>1</b></div></section><section class="col" data-col="next"><div class="col-head"><div class="col-title">Next</div><div class="count">0</div></div><div class="cards"></div><div class="estimate"><span>estimate</span><b>0</b></div></section><section class="col" data-col="later"><div class="col-head"><div class="col-title">Later</div><div class="count">0</div></div><div class="cards"></div><div class="estimate"><span>estimate</span><b>0</b></div></section><section class="col" data-col="cut"><div class="col-head"><div class="col-title">Cut</div><div class="count">0</div></div><div class="cards"></div><div class="estimate"><span>estimate</span><b>0</b></div></section></main></div><script>
let dragging=null;function update(){document.querySelectorAll(".col").forEach(c=>c.querySelector(".count").textContent=c.querySelectorAll(".card:not(.hide)").length);document.getElementById("summary").textContent=[...document.querySelectorAll(".card:not(.hide)")].length+" visible"}document.querySelectorAll(".card").forEach(c=>{c.addEventListener("dragstart",()=>dragging=c);c.addEventListener("dragend",()=>{dragging=null;update()})});document.querySelectorAll(".cards").forEach(l=>l.addEventListener("dragover",e=>{e.preventDefault();if(dragging&&dragging.parentElement!==l)l.appendChild(dragging)}));document.getElementById("copy").addEventListener("click",async()=>{const md=[...document.querySelectorAll(".col")].map(c=>"## "+c.querySelector(".col-title").textContent+"\\n"+[...c.querySelectorAll(".card")].map(card=>"- "+card.querySelector(".key").textContent+": "+card.querySelector(".title").textContent).join("\\n")).join("\\n\\n");await navigator.clipboard.writeText(md)});update();
</script></body></html>
