# Applied once per machine (create-missing-only, copied not linked); the live copy is operator-owned after first apply.
setupVersion: 1
theme:
  dark: dark-ocean
display:
  showTokenUsage: true
statusLine:
  preset: full
  separator: pipe
  sessionAccent: true
readLineNumbers: true
hideThinkingBlock: false
colorBlindMode: false
browser:
  headless: true
tui:
  tight: false
modelRoles:
  # default: <provider>/<model>
  default: null
  # smol: <provider>/<model>
  smol: null
  # slow: <provider>/<model>
  slow: null
  # plan: <provider>/<model>
  plan: null
  # task: <provider>/<model>
  task: null
  # vision: <provider>/<model>
  vision: null
task:
  eager: preferred
  agentModelOverrides: {}
mcp:
  discoveryMode: true
checkpoint:
  enabled: true
github:
  enabled: true
inspect_image:
  enabled: true
advisor:
  enabled: true
  subagents: false
dev:
  autoqa:
    consent: denied
defaultThinkingLevel: auto
cycleOrder:
  - smol
  - default
  - slow
enabledModels: []
disabledProviders: []
disabledExtensions: []
